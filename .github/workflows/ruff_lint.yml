name: Code Analysis Checks

on:
  workflow_dispatch:
  pull_request:
    branches: [ develop ] # Adjust branch name as needed

jobs:
  ruff-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x' # Or specify a specific version

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff lint check
        run: ruff check .

  pyright-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x' # Or specify a specific version

      - name: Install Pyright
        run: pip install pyright

      - name: Install support libraries
        run: pip install "kodistubs==21.*" Pillow

      - name: Run Pyright type check
        run: pyright
